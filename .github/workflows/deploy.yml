name: Auto-Deploy to Hostinger
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Check Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KVM_HOST }}
          username: ${{ secrets.KVM_USER }}
          key: ${{ secrets.KVM_KEY }}
          script: |
            set -e
            cd /root/.openclaw/workspace/suchbot-website
            
            # Pull latest changes from origin
            git pull origin main
            
            # Build: Skip npm install if package.json hasn't changed
            # Check if node_modules exists and is newer than package-lock.json
            if [ ! -d "node_modules" ] || [ "node_modules" -ot "package-lock.json" ]; then
              echo "Skipping npm install (dependencies up to date)"
            else
              npm install
            
            npm run build
            
            # Check deployment status (Node.js server auto-managed by systemd)
            echo "Checking deployment status..."
            curl -sI https://bot.mxjxn.com 2>&1 | grep -q "HTTP 200"
            
            if [ $? -eq 0 ]; then
              echo "✓ Site is live - deployment verified"
            else
              echo "✗ Site not responding - may need manual intervention"
              exit 1
            fi