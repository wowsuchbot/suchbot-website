name: Auto-Deploy to Hostinger
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Check Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KVM_HOST }}
          username: ${{ secrets.KVM_USER }}
          key: ${{ secrets.KVM_KEY }}
          script: |
            set -e
            cd /root/.openclaw/workspace/suchbot-website
            
            # Clean up the workspace
            git fetch origin main
            git reset --hard origin/main
            
            # Check deployment status (Node.js server auto-managed by systemd)
            echo "Checking deployment status..."
            curl -sI https://bot.mxjxn.com 2>&1 | grep -q "HTTP 200"
            
            if [ $? -eq 0 ]; then
              echo "✓ Site is live - deployment verified"
            else
              echo "✗ Site not responding - may need manual intervention"
              exit 1
            fi